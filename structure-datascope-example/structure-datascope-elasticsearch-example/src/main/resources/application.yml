# DataScope Elasticsearch 示例配置
server:
  port: 8086

spring:
  application:
    name: data-scope-elasticsearch-example
  main:
    allow-circular-references: true
  data:
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: http://172.24.20.15:9200
    username: elastic
    password: Elastic_aXbnMp
# 数据范围管理配置
structure:
  data-scope:
    enabled: true
    auto-filter-response: true
    scan-packages:
      - cn.structured.datascope.example.elasticsearch.dto
    field-config:
      org-id-field: orgId
      dept-id-field: deptId
  security:
    enabled: true
    antMatchers:
      unAuthenticated:
        - /**

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.elasticsearch: DEBUG
    root: INFO