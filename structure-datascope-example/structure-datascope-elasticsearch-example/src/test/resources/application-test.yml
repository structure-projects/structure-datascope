server:
  port: 8086

spring:
  application:
    name: data-scope-elasticsearch-example
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

structure:
  data-scope:
    enabled: true
    auto-filter-response: true
    scan-packages:
      - cn.structured.datascope.example.elasticsearch.dto
    field-config:
      org-id-field: orgId
      dept-id-field: deptId
  security:
    enabled: true
    antMatchers:
      unAuthenticated:
        - /**

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.elasticsearch: DEBUG
    root: INFO
