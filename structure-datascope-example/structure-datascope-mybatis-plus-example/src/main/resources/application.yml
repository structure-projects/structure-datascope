# DataScope MyBatis-Plus 示例配置
server:
  port: 8083

spring:
  application:
    name: data-scope-mybatis-plus-example
  datasource:
    url: jdbc:mysql://172.24.20.15:3306/example_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.structured.datascope.example.mybatisplus.entity

# 数据范围管理配置
structure:
  data-scope:
    enabled: true
    auto-register-rules: true
    auto-filter-response: true
    scan-packages:
      - cn.structured.datascope.example.mybatisplus.dto
    field-config:
      org-id-field: org_id
      dept-id-field: dept_id

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.mybatisplus: DEBUG
    root: INFO