# DataScope Spring Boot Starter 配置示例
server:
  port: 8081

spring:
  application:
    name: data-scope-example

# 数据范围管理配置
structure:
  data-scope:
    enabled: true
    auto-register-rules: true
    auto-filter-response: true
    scan-packages:
      - cn.structured.datascope.example.dto

logging:
  level:
    cn.structured.datascope: DEBUG
    root: INFO
