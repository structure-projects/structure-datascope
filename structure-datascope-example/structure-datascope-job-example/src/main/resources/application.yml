# DataScope Job 示例配置
server:
  port: 8085

spring:
  application:
    name: data-scope-job-example
  main:
    allow-circular-references: true

# 数据范围管理配置
structure:
  data-scope:
    enabled: true
    field-config:
  security:
    enabled: true
    antMatchers:
      unAuthenticated:
        - /**

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.job: DEBUG
    root: INFO