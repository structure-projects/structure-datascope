spring:
  application:
    name: data-scope-redis-example-test
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

structure:
  data-scope:
    enabled: true
    scan-packages:
      - cn.structured.datascope.example.redis.dto
    field-config:
      org-id-field: orgId
      dept-id-field: deptId
      user-id-field: userId
  security:
    enabled: true
    antMatchers:
      unAuthenticated:
        - /**

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.redis: DEBUG
    root: INFO
