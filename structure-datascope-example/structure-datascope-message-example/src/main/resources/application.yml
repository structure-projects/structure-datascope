# DataScope Message 示例配置（RabbitMQ）
server:
  port: 8087

spring:
  application:
    name: data-scope-message-example
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # RabbitMQ 连接配置
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 3
        max-concurrency: 10

# 数据范围管理配置
structure:
  data-scope:
    enabled: true
    field-config:
      org-id-field: orgId
      dept-id-field: deptId

logging:
  level:
    cn.structured.datascope: DEBUG
    cn.structured.datascope.example.message: DEBUG
    root: INFO